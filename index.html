<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grids</title>
  <meta property="og:title" content="Grids">
  <meta property="og:description" content="Generate paper grid backgrounds in multiple styles, ratios, and colors. Export as JPEG or SVG.">
  <meta property="og:image" content="images/gridmaker-og.jpg">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="preview-wrap">
  <canvas id="preview-canvas"></canvas>
</div>

<div class="controls">
  <div class="control-row">
    <div class="toggle-bar" id="ratio-toggle">
      <div class="toggle-item active" data-ratio="16:9">16:9</div>
      <div class="toggle-item" data-ratio="1:1">1:1</div>
      <div class="toggle-item" data-ratio="4:5">4:5</div>
      <div class="toggle-item" data-ratio="9:16">9:16</div>
    </div>
  </div>

  <div class="control-row">
    <div class="toggle-bar" id="style-toggle">

      <!-- Line: full stroke square -->
      <div class="toggle-item active" data-style="line" title="Line">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="16" height="16" class="icon-stroke" stroke-width="1.6" fill="none"/>
        </svg>
      </div>

      <!-- Gap: middle segment of each edge visible, corners absent -->
      <div class="toggle-item" data-style="gap" title="Gap">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="7"  y1="3"  x2="15" y2="3"  class="icon-stroke" stroke-width="1.6" stroke-linecap="square"/>
          <line x1="7"  y1="19" x2="15" y2="19" class="icon-stroke" stroke-width="1.6" stroke-linecap="square"/>
          <line x1="3"  y1="7"  x2="3"  y2="15" class="icon-stroke" stroke-width="1.6" stroke-linecap="square"/>
          <line x1="19" y1="7"  x2="19" y2="15" class="icon-stroke" stroke-width="1.6" stroke-linecap="square"/>
        </svg>
      </div>

      <!-- Cross: small + mark -->
      <div class="toggle-item" data-style="crosshair" title="Cross">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="11" y1="6"  x2="11" y2="16" class="icon-stroke" stroke-width="1.6" stroke-linecap="square"/>
          <line x1="6"  y1="11" x2="16" y2="11" class="icon-stroke" stroke-width="1.6" stroke-linecap="square"/>
        </svg>
      </div>

      <!-- Dot: filled circle -->
      <div class="toggle-item" data-style="dot" title="Dot">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="3.5" class="icon-fill" stroke="none"/>
        </svg>
      </div>

      <!-- Square: filled square -->
      <div class="toggle-item" data-style="square" title="Square">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="7" y="7" width="8" height="8" class="icon-fill" stroke="none"/>
        </svg>
      </div>

      <!-- Diamond: filled square rotated 45deg -->
      <div class="toggle-item" data-style="diamond" title="Diamond">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="11,5 17,11 11,17 5,11" class="icon-fill" stroke="none"/>
        </svg>
      </div>

    </div>
    <button class="icon-btn" id="btn-minus">−</button>
    <button class="icon-btn" id="btn-plus">+</button>
  </div>

  <div class="control-row" style="height:auto; align-items:center;">
    <div class="swatch-row" id="swatch-row"></div>
  </div>

  <div class="control-row">
    <button class="action-btn" id="btn-download">Download</button>
    <button class="action-btn" id="btn-copy-svg">Copy SVG</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
